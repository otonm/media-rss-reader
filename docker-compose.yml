services:
  media-rss:
    image: ghcr.io/otonm/media-rss-reader:latest
    ports:
      - "8082:8080"
    volumes:
      - ./feeds.opml:/data/feeds.opml:ro
      - reader_data:/data/db
      - media_cache:/cache
    environment:
      - TZ=Europe/Berlin
      - LOG_LEVEL=debug
      - AUTH_USERNAME=admin
      - AUTH_PASSWORD=changeme
      - AUTH_SECRET_KEY=replace-with-a-random-32-char-secret
      - IMAGE_DISPLAY_DELAY_MS=500
      - AUTO_SCROLL_SPEED=5
      # Paths (override if mounting volumes differently)
      # - OPML_PATH=/data/feeds.opml
      # - DB_PATH=/data/db/reader.db
      # - CACHE_DIR=/cache
      # Feed refresh schedule
      # - OPML_SYNC_INTERVAL=3600
      # - FEED_REFRESH_INTERVAL=900
      # Media cache
      # - CACHE_MAX_ITEMS=500
      # - CACHE_MAX_AGE_HOURS=48
      # UI behaviour
      # - PREFETCH_AHEAD=5
      # - IMAGE_DISPLAY_DELAY_MS=5000
      # - SLIDESHOW_TRANSITION_MS=400
      # - AUTO_SCROLL_SPEED=1.5
      # Server
      # - PORT=8080
      # - LOG_LEVEL=info
    restart: unless-stopped

volumes:
  reader_data:
  media_cache:
