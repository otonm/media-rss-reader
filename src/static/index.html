<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media RSS Reader</title>
  <!-- SLIDESHOW_TRANSITION -->
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="scroll-view">
    <div id="empty-state" class="hidden">Fetching media… check back in a moment.</div>
    <div id="feed-list"></div>
  </div>
  <div id="slideshow-view" class="hidden">
    <div class="slide-layer" id="slide-a"></div>
    <div class="slide-layer" id="slide-b"></div>
  </div>
  <div id="controls">
    <span>j/k navigate</span>
    <span>a auto-scroll</span>
    <span>s slideshow</span>
    <span>m mute</span>
    <span>d theme</span>
  </div>
  <div id="fab-container">
    <div id="fab-menu" class="hidden">
      <button class="fab-btn" id="fab-theme"      title="Theme"       onclick="toggleTheme();updateFab()">🌙</button>
      <button class="fab-btn" id="fab-mute"       title="Mute"        onclick="toggleMute();updateFab()">🔇</button>
      <button class="fab-btn" id="fab-slideshow"  title="Slideshow"   onclick="toggleSlideshow();updateFab()">⊞</button>
      <button class="fab-btn" id="fab-autoscroll" title="Auto-scroll" onclick="toggleAutoScroll();updateFab()">⟳</button>
    </div>
    <button id="fab" title="Menu" onclick="toggleFab()">☰</button>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
